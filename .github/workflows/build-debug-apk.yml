name: Build Debug APK

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Dar permissão ao Gradle Wrapper
        run: chmod +x ./gradlew

      - name: Mostrar versões
        run: |
          echo "============================================================"
          echo "VERSÕES DO AMBIENTE"
          echo "============================================================"
          java -version
          ./gradlew --version
          echo "============================================================"

      - name: Compilar APK debug
        run: |
          echo "============================================================"
          echo "COMPILANDO APK DEBUG"
          echo "============================================================"
          ./gradlew :app:assembleDebug --no-daemon
          echo "============================================================"
          echo "RESULTADO FINAL: BUILD FINALIZADO"
          echo "============================================================"

      - name: Preparar APK com nome claro
        run: |
          echo "============================================================"
          echo "PREPARANDO ARQUIVO FINAL"
          echo "============================================================"

          mkdir -p resultado-apk

          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            cp app/build/outputs/apk/debug/app-debug.apk resultado-apk/APP_debug_gerado_pelo_GitHub_Actions.apk
            echo "APK encontrado e copiado."
          else
            echo "RESULTADO FINAL: DEU ERRO"
            echo "APK não encontrado em app/build/outputs/apk/debug/app-debug.apk"
            exit 1
          fi

          echo "Arquivos gerados:"
          find resultado-apk -type f -maxdepth 2 -print

          echo "============================================================"
          echo "RESULTADO FINAL: DEU CERTO"
          echo "APK:"
          echo "APP_debug_gerado_pelo_GitHub_Actions.apk"
          echo "============================================================"

      - name: Enviar APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: APP_debug_gerado_pelo_GitHub_Actions
          path: resultado-apk/APP_debug_gerado_pelo_GitHub_Actions.apk
          if-no-files-found: error
          retention-days: 14
