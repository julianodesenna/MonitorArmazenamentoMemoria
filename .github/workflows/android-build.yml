name: Android Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: Build APK and AAB
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.5.1

      - name: Compilar APK de teste e AAB da Play Store
        run: |
          echo "============================================================"
          echo "COMPILANDO APK DE TESTE E AAB DA PLAY STORE"
          echo "============================================================"
          gradle :app:assembleDebug :app:bundleRelease
          echo "============================================================"
          echo "RESULTADO FINAL: BUILD FINALIZADO"
          echo "============================================================"

      - name: Preparar arquivos com nomes diretos
        run: |
          echo "============================================================"
          echo "PREPARANDO ARQUIVOS PARA DOWNLOAD"
          echo "============================================================"

          mkdir -p release-files

          APK_ORIGINAL="$(find app/build/outputs/apk/debug -name '*.apk' | head -n 1)"
          AAB_ORIGINAL="$(find app/build/outputs/bundle/release -name '*.aab' | head -n 1)"

          if [ -z "$APK_ORIGINAL" ]; then
            echo "RESULTADO FINAL: DEU ERRO"
            echo "APK não encontrado."
            exit 1
          fi

          if [ -z "$AAB_ORIGINAL" ]; then
            echo "RESULTADO FINAL: DEU ERRO"
            echo "AAB não encontrado."
            exit 1
          fi

          cp "$APK_ORIGINAL" release-files/MonitorArmazenamentoMemoria-APK-Teste.apk
          cp "$AAB_ORIGINAL" release-files/MonitorArmazenamentoMemoria-AAB-PlayStore.aab

          echo "Arquivos preparados:"
          ls -lh release-files

          echo "============================================================"
          echo "RESULTADO FINAL: DEU CERTO"
          echo "APK direto:"
          echo "MonitorArmazenamentoMemoria-APK-Teste.apk"
          echo "AAB direto:"
          echo "MonitorArmazenamentoMemoria-AAB-PlayStore.aab"
          echo "============================================================"

      - name: Salvar APK direto no Actions sem ZIP
        uses: actions/upload-artifact@v7
        with:
          name: MonitorArmazenamentoMemoria-APK-Teste.apk
          path: release-files/MonitorArmazenamentoMemoria-APK-Teste.apk
          archive: false
          if-no-files-found: error
          retention-days: 14

      - name: Salvar AAB direto no Actions sem ZIP
        uses: actions/upload-artifact@v7
        with:
          name: MonitorArmazenamentoMemoria-AAB-PlayStore.aab
          path: release-files/MonitorArmazenamentoMemoria-AAB-PlayStore.aab
          archive: false
          if-no-files-found: error
          retention-days: 14

      - name: Salvar APK de teste como Artifact ZIP reserva
        uses: actions/upload-artifact@v4
        with:
          name: MonitorArmazenamentoMemoria-APK-Teste-ZIP-Reserva
          path: release-files/MonitorArmazenamentoMemoria-APK-Teste.apk
          if-no-files-found: error
          retention-days: 14

      - name: Salvar AAB Play Store como Artifact ZIP reserva
        uses: actions/upload-artifact@v4
        with:
          name: MonitorArmazenamentoMemoria-AAB-PlayStore-ZIP-Reserva
          path: release-files/MonitorArmazenamentoMemoria-AAB-PlayStore.aab
          if-no-files-found: error
          retention-days: 14

      - name: Criar Release com APK direto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "============================================================"
          echo "CRIANDO RELEASE COM APK DIRETO"
          echo "============================================================"

          DATA_HORA="$(date +'%Y%m%d-%H%M%S')"
          SHORT_SHA="$(echo '${{ github.sha }}' | cut -c1-7)"
          TAG_NAME="apk-${DATA_HORA}-${SHORT_SHA}"
          RELEASE_NAME="APK Teste ${DATA_HORA}"

          gh release create "$TAG_NAME" \
            release-files/MonitorArmazenamentoMemoria-APK-Teste.apk \
            release-files/MonitorArmazenamentoMemoria-AAB-PlayStore.aab \
            --title "$RELEASE_NAME" \
            --notes "APK de teste gerado automaticamente pelo GitHub Actions.

          Commit: ${{ github.sha }}

          Arquivos:
          - MonitorArmazenamentoMemoria-APK-Teste.apk
          - MonitorArmazenamentoMemoria-AAB-PlayStore.aab

          Baixe o APK para instalar no celular:
          MonitorArmazenamentoMemoria-APK-Teste.apk"

          echo "============================================================"
          echo "RESULTADO FINAL: DEU CERTO"
          echo "RELEASE CRIADA:"
          echo "$RELEASE_NAME"
          echo "TAG:"
          echo "$TAG_NAME"
          echo "============================================================"
